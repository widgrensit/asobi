name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-audit: true
      enable-ct: true
      extra-services-compose: 'docker-compose.yml'
      enable-dependency-submission: true
      enable-summary: true
    secrets: inherit
