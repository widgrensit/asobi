name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@559dea550228fb7042813f6b6359addec11bedcf  # main as of 2026-05-20, pinned via Dependabot
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-audit: true
      # GHSA-g2wm-735q-3f56 (LOW, cowlib cookie/1) has no upstream patch
      # and does not apply: asobi only calls cow_cookie:setcookie via
      # cowboy. Tracked in docs/security_audit_2026_05_19.md.
      audit-ignores: 'GHSA-g2wm-735q-3f56'
      enable-ct: true
      extra-services-compose: 'docker-compose.yml'
      enable-dependency-submission: true
      enable-summary: true
      # erlang-ci restores _build from cache keyed on rebar.lock, then runs
      # `rebar3 clean` which only wipes ebin. Stale test artifacts copied in
      # by previous runs survive and get executed by rebar3 eunit/ct. That's
      # how asobi_lua_SUITE.beam (removed in #59) keeps reappearing in CT
      # and crashing on `luerl:init/0` undef. Force-fresh project test tree.
      pre-test-command: 'rm -rf _build/default/lib/asobi/test _build/test/lib/asobi/test'
    secrets: inherit
