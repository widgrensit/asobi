name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    uses: Taure/erlang-ci/.github/workflows/release.yml@main
    permissions:
      contents: write

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        if: steps.tag.outputs.skip == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.tag.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        if: steps.tag.outputs.skip == 'false'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
